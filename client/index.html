<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Management</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- Socket.io client from CDN -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>Task Manager</h1>
      <button id="logoutBtn" class="btn hidden">Logout</button>
    </header>

    <!-- Auth Modal -->
    <div id="authModal" class="modal">
      <div class="modal-content glass">
        <h2 id="authTitle">Login</h2>
        <form id="authForm">
          <input type="text" id="username" placeholder="Username" required />
          <input type="password" id="password" placeholder="Password" required />
          <button type="submit" class="btn primary">Submit</button>
        </form>
        <p id="toggleAuth">No account? <span class="link">Register</span></p>
        <p id="authError" class="error hidden"></p>
      </div>
    </div>

    <!-- Main App -->
    <main id="app" class="hidden">
      <section class="new-task">
        <input type="text" id="newTitle" placeholder="Task title" />
        <input type="text" id="newDesc" placeholder="Description (optional)" />
        <button id="addTaskBtn" class="btn primary">Add Task</button>
      </section>
      <section id="tasks" class="tasks-grid"></section>
    </main>
  </div>
</body>
</html>
